<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            color: #fff;
            min-width: 320px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .app-title {
            font-family: 'Rajdhani', sans-serif !important;
            font-size: 24px !important;
            font-weight: 700 !important;
            letter-spacing: 0.5px !important;
            line-height: 1.1 !important;
            margin: 0 !important;

            /* Keep the original gradient look while avoiding theme overrides */
            background: linear-gradient(135deg, #fff 0%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button.primary {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button.primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
            background: linear-gradient(135deg, #333 0%, #222 100%);
        }

        button.play {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
        }

        button.play:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        button.pause {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
        }

        button.pause:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        button:disabled {
            background: #333 !important;
            color: #666 !important;
            cursor: not-allowed;
            opacity: 0.5;
            transform: none !important;
        }

        .slider-container {
            margin: 16px 0;
        }

        .slider-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-value {
            color: #fff;
            font-weight: 600;
            font-size: 13px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.5);
            transition: all 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 3px 12px rgba(59, 130, 246, 0.7);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.5);
            transition: all 0.2s;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 3px 12px rgba(59, 130, 246, 0.7);
        }

        .info {
            margin: 16px 0;
            font-size: 12px;
            color: #999;
        }

        .info-value {
            color: #fff;
            font-weight: 600;
            margin-top: 6px;
            font-size: 13px;
        }

        .progress-container {
            margin: 16px 0;
        }

        .progress-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .time-display {
            font-size: 11px;
            color: #aaa;
            font-variant-numeric: tabular-nums;
        }

        .keyboard-shortcuts {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shortcuts-title {
            font-size: 11px;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 6px 0;
            font-size: 12px;
        }

        .shortcut-key {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 60px;
            text-align: center;
        }

        .shortcut-desc {
            color: #aaa;
            flex: 1;
            margin-left: 12px;
        }

        #controls.hidden {
            display: none;
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 768px) {
            #controls {
                top: 10px;
                left: 10px;
                right: 10px;
                min-width: auto;
                max-width: calc(100% - 20px);
                padding: 16px;
            }

            .app-title {
                font-size: 16px !important;
            }

            .logo {
                width: 20px;
                height: 30px;
            }

            button {
                padding: 12px;
                font-size: 13px;
            }
        }

        /* Ensure proper sizing in embedded contexts */
        .visualizer-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
    
        /* --- Squarespace safety: enforce app font within the embed --- */
        #controls, #controls * {
            font-family: 'Rajdhani', sans-serif !important;
        }

        /* Centered logo at top of panel */
        .logo-top {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 14px;
        }
        .logo-top .logo {
            width: 80px;
            height: auto;
            opacity: 0.92;
        }

        /* Colormap toggle row */
        .cmap-toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            padding: 4px 0;
        }
        .cmap-toggle-row:hover .section-title { color: #ccc; }
        .cmap-arrow {
            font-size: 12px;
            color: #666;
            transition: transform 0.2s, color 0.2s;
            display: inline-block;
        }
        .cmap-arrow.open {
            transform: rotate(90deg);
            color: #999;
        }

        /* Collapsed cmap body */
        .cmap-body {
            overflow: hidden;
            max-height: 400px;
            transition: max-height 0.25s ease, opacity 0.2s;
            opacity: 1;
        }
        .cmap-body.collapsed {
            max-height: 0;
            opacity: 0;
        }

        /* Minimized panel – only logo + header visible */
        #controls.collapsed .controls-content { display: none; }

        /* Minimize button */
        .minimize-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15) !important;
            border-radius: 6px;
            color: #aaa;
            width: 28px !important;
            height: 28px;
            padding: 0 !important;
            margin: 0 !important;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        .minimize-btn:hover:not(:disabled) { background: rgba(255,255,255,0.16) !important; color: #fff; transform: none !important; box-shadow: none !important; }
        #controls.collapsed .controls-content { display: none; }

        /* Colormap selector */
        .section-title {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .cmap-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }
        .cmap-btn {
            padding: 6px 4px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.10) !important;
            background: rgba(255,255,255,0.05);
            color: #999;
            cursor: pointer;
            transition: all 0.18s;
            text-align: center;
            width: 100%;
            margin: 0;
            font-family: 'Rajdhani', sans-serif !important;
        }
        .cmap-btn:hover:not(:disabled) { background: rgba(255,255,255,0.12) !important; color: #eee; transform: none !important; box-shadow: none !important; }
        .cmap-btn.active { border-color: #3b82f6 !important; color: #fff; background: rgba(59,130,246,0.22) !important; }
        .cmap-auto-row { grid-column: span 2; }
        .cmap-btn.auto-active { border-color: rgba(74,222,128,0.55) !important; color: #4ade80 !important; background: rgba(74,222,128,0.10) !important; }

        /* Beat flash overlay */
        @keyframes beatFlash {
            0%   { opacity: 0; }
            8%   { opacity: 1; }
            100% { opacity: 0; }
        }
        #beat-flash {
            position: fixed; inset: 0; pointer-events: none; z-index: 500;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.20) 0%, transparent 68%);
            opacity: 0;
        }
        #beat-flash.flash { animation: beatFlash 0.38s ease-out forwards; }

        /* Drag-and-drop overlay */
        #drag-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 3000;
            background: rgba(59,130,246,0.10);
            border: 3px dashed rgba(59,130,246,0.65);
            border-radius: 20px;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 14px;
            color: #fff;
            pointer-events: none;
        }
        #drag-overlay.active { display: flex; }
        .drag-icon { font-size: 52px; }
        .drag-label { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
        .drag-sub { font-size: 14px; color: rgba(255,255,255,0.6); }

        .progress-bar { overflow: visible; }

        .cmap-section {
            margin: 16px 0;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

    </style>
</head>
<body>
    <div class="visualizer-container">
        <canvas id="canvas"></canvas>

        <div id="controls">
            <!-- Logo centered at top -->
            <div class="logo-top">
                <img src="https://images.squarespace-cdn.com/content/v1/681ea18dd168a935c26295bd/f173dc58-2856-4e84-b647-8cf46ca113ad/phonto-Photoroom.png?format=1000w" alt="Logo" class="logo">
            </div>

            <!-- Title row with minimize -->
            <div class="header-container">
                <div class="app-title">Particle Visualizer</div>
                <button class="minimize-btn" id="minimize-btn" title="Collapse panel">−</button>
            </div>

            <div class="controls-content">
            <button id="load-btn" class="primary">Load Audio File</button>
            <button id="play-btn" class="play" disabled>▶ Play</button>

            <!-- Progress bar and file name directly under play -->
            <div class="progress-container" id="progress-container" style="display: none;">
                <div class="progress-label">
                    <span class="time-display" id="current-time">0:00</span>
                    <span class="time-display" id="duration-time">0:00</span>
                </div>
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="info">
                <div class="stat-label">Audio File</div>
                <div id="audio-name" class="info-value">No file loaded</div>
            </div>

            <div class="slider-container">
                <div class="slider-label">
                    <span>Volume</span>
                    <span class="slider-value" id="volume-value">100%</span>
                </div>
                <input type="range" id="volume-slider" min="0" max="100" value="100">
            </div>

            <div class="slider-container">
                <div class="slider-label">
                    <span>Reactivity</span>
                    <span class="slider-value" id="reactivity-value">100%</span>
                </div>
                <input type="range" id="reactivity-slider" min="10" max="300" value="100">
            </div>

            <!-- Colour map – collapsed by default -->
            <div class="cmap-section">
                <div class="cmap-toggle-row" id="cmap-toggle-row">
                    <div class="section-title" style="margin:0;">Color Maps</div>
                    <span class="cmap-arrow" id="cmap-arrow">▸</span>
                </div>
                <div class="cmap-body" id="cmap-body">
                    <div class="cmap-grid" id="cmap-grid">
                        <div class="cmap-auto-row">
                            <button class="cmap-btn auto-active" data-cmap="auto">⟳ Auto-cycle</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Reset to defaults -->
            <button id="reset-btn" class="primary">Reset to Defaults</button>

            <div class="keyboard-shortcuts">
                <div class="shortcuts-title">Keyboard Shortcuts</div>
                <div class="shortcut-item">
                    <div class="shortcut-key">SPACE</div>
                    <div class="shortcut-desc">Play / Pause</div>
                </div>
                <div class="shortcut-item">
                    <div class="shortcut-key">F</div>
                    <div class="shortcut-desc">Fullscreen</div>
                </div>
                <div class="shortcut-item">
                    <div class="shortcut-key">H</div>
                    <div class="shortcut-desc">Hide UI</div>
                </div>
            </div>
            </div> <!-- End controls-content -->
        </div>
    </div>

    <div id="beat-flash"></div>
    <div id="drag-overlay">
        <div class="drag-icon">🎵</div>
        <div class="drag-label">Drop audio file</div>
        <div class="drag-sub">mp3 · wav · ogg · flac · aac</div>
    </div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        // ===== IMPORTS =====
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // ===== CONSTANTS =====
        const MIN_PARTICLES = 800;
        const MAX_PARTICLES = 20000;
        const PARTICLE_SIZE = 0.15; // fixed size (world units) - doubled
        
        // Noise-based motion parameters (from cube_particles_motion_rules.md)
        const DT = 0.0875;                  // time step
        const DAMPING = 0.95;            // velocity damping
        const NOISE_SCALE = 1.0;         // noise field scale
        const AUDIO_FACTOR = 3.0;        // audio gain multiplier
        const WORLD_BOUNDARY = 32;       // boundary for camera/rendering
        const SPHERE_BOUNDARY = 1.0;     // particle confinement sphere radius
const FREQ_BANDS = [
            { name: 'Sub Bass', min: 20, max: 60 },
            { name: 'Bass', min: 60, max: 250 },
            { name: 'Low Mids', min: 250, max: 500 },
            { name: 'Midrange', min: 500, max: 2000 },
            { name: 'Upper Mids', min: 2000, max: 4000 },
            { name: 'Presence', min: 4000, max: 6000 },
            { name: 'Brilliance', min: 6000, max: 20000 }
        ];

        // ===== 4D OPENSIMPLEX NOISE =====
        // Simplified 4D noise implementation for particle motion
        class SimplexNoise {
            constructor(seed = Math.random()) {
                this.p = new Uint8Array(512);
                this.perm = new Uint8Array(512);
                
                // Initialize permutation table with seed
                for (let i = 0; i < 256; i++) {
                    this.p[i] = i;
                }
                
                // Shuffle
                let n, q;
                for (let i = 255; i > 0; i--) {
                    n = Math.floor((seed + i) * 123456.789) % (i + 1);
                    q = this.p[i];
                    this.p[i] = this.p[n];
                    this.p[n] = q;
                }
                
                // Duplicate
                for (let i = 0; i < 512; i++) {
                    this.perm[i] = this.p[i & 255];
                }
            }
            
            // 4D Simplex noise
            noise4D(x, y, z, w) {
                const F4 = 0.309016994; // (Math.sqrt(5.0) - 1.0) / 4.0
                const G4 = 0.138196601; // (5.0 - Math.sqrt(5.0)) / 20.0
                
                const s = (x + y + z + w) * F4;
                const i = Math.floor(x + s);
                const j = Math.floor(y + s);
                const k = Math.floor(z + s);
                const l = Math.floor(w + s);
                
                const t = (i + j + k + l) * G4;
                const X0 = i - t;
                const Y0 = j - t;
                const Z0 = k - t;
                const W0 = l - t;
                
                const x0 = x - X0;
                const y0 = y - Y0;
                const z0 = z - Z0;
                const w0 = w - W0;
                
                // Simplex ranking
                let rankx = 0;
                let ranky = 0;
                let rankz = 0;
                let rankw = 0;
                
                if (x0 > y0) rankx++; else ranky++;
                if (x0 > z0) rankx++; else rankz++;
                if (x0 > w0) rankx++; else rankw++;
                if (y0 > z0) ranky++; else rankz++;
                if (y0 > w0) ranky++; else rankw++;
                if (z0 > w0) rankz++; else rankw++;
                
                const i1 = rankx >= 3 ? 1 : 0;
                const j1 = ranky >= 3 ? 1 : 0;
                const k1 = rankz >= 3 ? 1 : 0;
                const l1 = rankw >= 3 ? 1 : 0;
                
                const i2 = rankx >= 2 ? 1 : 0;
                const j2 = ranky >= 2 ? 1 : 0;
                const k2 = rankz >= 2 ? 1 : 0;
                const l2 = rankw >= 2 ? 1 : 0;
                
                const i3 = rankx >= 1 ? 1 : 0;
                const j3 = ranky >= 1 ? 1 : 0;
                const k3 = rankz >= 1 ? 1 : 0;
                const l3 = rankw >= 1 ? 1 : 0;
                
                const x1 = x0 - i1 + G4;
                const y1 = y0 - j1 + G4;
                const z1 = z0 - k1 + G4;
                const w1 = w0 - l1 + G4;
                
                const x2 = x0 - i2 + 2 * G4;
                const y2 = y0 - j2 + 2 * G4;
                const z2 = z0 - k2 + 2 * G4;
                const w2 = w0 - l2 + 2 * G4;
                
                const x3 = x0 - i3 + 3 * G4;
                const y3 = y0 - j3 + 3 * G4;
                const z3 = z0 - k3 + 3 * G4;
                const w3 = w0 - l3 + 3 * G4;
                
                const x4 = x0 - 1 + 4 * G4;
                const y4 = y0 - 1 + 4 * G4;
                const z4 = z0 - 1 + 4 * G4;
                const w4 = w0 - 1 + 4 * G4;
                
                const ii = i & 255;
                const jj = j & 255;
                const kk = k & 255;
                const ll = l & 255;
                
                let n0, n1, n2, n3, n4;
                
                let t0 = 0.6 - x0*x0 - y0*y0 - z0*z0 - w0*w0;
                if (t0 < 0) n0 = 0;
                else {
                    t0 *= t0;
                    n0 = t0 * t0 * this.grad4(this.perm[ii + this.perm[jj + this.perm[kk + this.perm[ll]]]], x0, y0, z0, w0);
                }
                
                let t1 = 0.6 - x1*x1 - y1*y1 - z1*z1 - w1*w1;
                if (t1 < 0) n1 = 0;
                else {
                    t1 *= t1;
                    n1 = t1 * t1 * this.grad4(this.perm[ii + i1 + this.perm[jj + j1 + this.perm[kk + k1 + this.perm[ll + l1]]]], x1, y1, z1, w1);
                }
                
                let t2 = 0.6 - x2*x2 - y2*y2 - z2*z2 - w2*w2;
                if (t2 < 0) n2 = 0;
                else {
                    t2 *= t2;
                    n2 = t2 * t2 * this.grad4(this.perm[ii + i2 + this.perm[jj + j2 + this.perm[kk + k2 + this.perm[ll + l2]]]], x2, y2, z2, w2);
                }
                
                let t3 = 0.6 - x3*x3 - y3*y3 - z3*z3 - w3*w3;
                if (t3 < 0) n3 = 0;
                else {
                    t3 *= t3;
                    n3 = t3 * t3 * this.grad4(this.perm[ii + i3 + this.perm[jj + j3 + this.perm[kk + k3 + this.perm[ll + l3]]]], x3, y3, z3, w3);
                }
                
                let t4 = 0.6 - x4*x4 - y4*y4 - z4*z4 - w4*w4;
                if (t4 < 0) n4 = 0;
                else {

            reset(randomizePosition = true) {

                        r * Math.sin(phi) * Math.cos(theta),
                        r * Math.sin(phi) * Math.sin(theta),
                        r * Math.cos(phi)
                    );
                } else if (!this.position) {

                }

                // Initial velocity is zero

                this.color = new THREE.Color(1, 1, 1);
            }

            update(t, amp, noiseScale, sphereBoundary) {
                const x = this.position.x;
                const y = this.position.y;
                const z = this.position.z;

                // 4D noise acceleration with axis decorrelation offsets
                // noiseScale varies with audio magnitude for turbulence
                const ax = noise.noise4D(x * noiseScale, y * noiseScale, z * noiseScale, t);
                const ay = noise.noise4D((x + 100) * noiseScale, (y + 100) * noiseScale, (z + 100) * noiseScale, t);
                const az = noise.noise4D((x + 200) * noiseScale, (y + 200) * noiseScale, (z + 200) * noiseScale, t);

                // Audio-scaled gain: baseline 25%, max 50% of original values
                // No audio: 0.25x, Full audio: 2.0x
                const gain = DT * (0.25 + amp * 1.75);

                // Velocity update: v = v * damping + a * gain
                this.velocity.x = this.velocity.x * DAMPING + ax * gain;
                this.velocity.y = this.velocity.y * DAMPING + ay * gain;
                this.velocity.z = this.velocity.z * DAMPING + az * gain;

                // Position update: p += v * dt
                this.position.x += this.velocity.x * DT;
                this.position.y += this.velocity.y * DT;
                this.position.z += this.velocity.z * DT;

                // Sphere boundary reflection (perfect elastic reflection)
                // Use dynamic sphere boundary
                const distSq = this.position.x * this.position.x + 
                               this.position.y * this.position.y + 
                               this.position.z * this.position.z;
                const dist = Math.sqrt(distSq);
                
                if (dist > sphereBoundary) {
                    // Normalize position to sphere surface
                    const factor = sphereBoundary / dist;
                    this.position.x *= factor;
                    this.position.y *= factor;
                    this.position.z *= factor;
                    
                    // Reflect velocity: v' = v - 2(v·n)n where n is surface normal
                    const nx = this.position.x / sphereBoundary;
                    const ny = this.position.y / sphereBoundary;
                    const nz = this.position.z / sphereBoundary;
                    
                    const dotProduct = this.velocity.x * nx + this.velocity.y * ny + this.velocity.z * nz;
                    
                    this.velocity.x -= 2 * dotProduct * nx;
                    this.velocity.y -= 2 * dotProduct * ny;
                    this.velocity.z -= 2 * dotProduct * nz;
                }
            }

                        c0[1] + (c1[1]-c0[1]) * u,
                        c0[2] + (c1[2]-c0[2]) * u,

                    const fade = 0.20 + 0.80 * near + 0.25 * far;           // lift far end slightly

                    // Subtle twinkle to avoid flatness
                    const twinkle = 0.78 + 0.22 * Math.sin(tNow * 2.0 + i * 0.013);

                    const b = Math.max(0.0, Math.min(1.0, intensity * fade * twinkle * tunnelWeights[i] * startFade));

                    col[idx + 0] = b;
                    col[idx + 1] = b;
                    col[idx + 2] = b;
                }

                tunnelGeo.attributes.position.needsUpdate = true;
                tunnelGeo.attributes.color.needsUpdate = true;
            }
            // Only update far cap when playing
            if (isPlaying || !audioLoaded) {
                // Update far cap brightness (cap is static in Z; only twinkles with audio)
                const capCol = capGeo.attributes.color.array;
                for (let i = 0; i < CAP_COUNT; i++) {
                    const idx = i * 3;

                    // Emphasize the cap when audio is stronger, but keep it subtle
                    const tw = 0.84 + 0.16 * Math.sin(tNow * 1.10 + i * 0.019);
                    const b  = Math.max(0.0, Math.min(1.0, (0.16 + intensity * 0.62) * tw * capWeights[i]));

                    capCol[idx + 0] = b;
                    capCol[idx + 1] = b;
                    capCol[idx + 2] = b;
                }
                capGeo.attributes.color.needsUpdate = true;
            }

            // Material response to magnitude (size/opacity)
            tunnelMat.size = (audioLoaded && isPlaying) ? (0.70 + mag * 1.10) : 0.75;
            tunnelMat.opacity = (audioLoaded && isPlaying) ? (0.30 + mag * 0.40) : 0.28;

            // Keep the vanishing point subtle but present
            vpMat.size = (audioLoaded && isPlaying) ? (1.1 + mag * 1.4) : 1.25;
            vpMat.opacity = (audioLoaded && isPlaying) ? (0.10 + mag * 0.22) : 0.12;

            capMat.size = (audioLoaded && isPlaying) ? (0.01 + mag * 0.01) : 0.92;
            capMat.opacity = (audioLoaded && isPlaying) ? (0.14 + mag * 0.22) : 0.14;

            // Far glow: subtle at rest, blooms with magnitude (removes any remaining black disk)
            glowMat.opacity = (audioLoaded && isPlaying) ? (0.10 + mag * 0.35) : 0.12;
            const glowScale = (audioLoaded && isPlaying) ? (TUNNEL_RADIUS * (2.6 + mag * 1.0)) : (TUNNEL_RADIUS * 2.75);
            glowSprite.scale.set(glowScale, glowScale, 1);

            // Keep tunnel centered and aligned with camera (no rotation drift)
            tunnelGroup.position.copy(camera.position);
            tunnelGroup.quaternion.copy(camera.quaternion);

            // Particle count: scales with average magnitude
            const targetCount = (audioLoaded && isPlaying)
                ? Math.floor(MIN_PARTICLES + avgMagnitude * reactivityMultiplier * (MAX_PARTICLES - MIN_PARTICLES))
                : MIN_PARTICLES;
            activeCount = Math.floor(activeCount + (targetCount - activeCount) * 0.05);
            activeCount = Math.max(MIN_PARTICLES, Math.min(MAX_PARTICLES, activeCount));

            // Speed: sphere particles react to 0-150Hz only
            const speedMultiplier = (audioLoaded && isPlaying)
                ? (5.6+ sphereMagnitude * 25.6)
                : 0.7;

            // Color: cycle through colormaps (unless locked); sphere reacts to 0-150Hz only
            const cycleSpeed = (audioLoaded && isPlaying) ? (0.08 + sphereMagnitude * 0.42) : 0.06;
            
            // Only cycle colors when playing and not locked
            if (isPlaying && lockedCmapIndex < 0) {
                cmapMix += 0.016 * cycleSpeed;
                if (cmapMix >= 1) {
                    cmapMix = 0;
                    cmapA = cmapB;
                    cmapB = (cmapB + 1) % COLORMAPS.length;
                }
            } else if (lockedCmapIndex >= 0) {
                cmapA = lockedCmapIndex;
                cmapB = lockedCmapIndex;
                cmapMix = 0;
            }

            const brightness = (audioLoaded && isPlaying) ? (0.25 + sphereMagnitude * 0.95) : 0.25;

            // Update swarm using 4D noise field (no inter-particle interactions)
            // Sphere particles react to 0-150Hz only
            const amp = Math.max(0, Math.min(1, sphereMagnitude));
            
            // Noise scale varies with low frequency magnitude for turbulence
            // Higher magnitude = more turbulent/chaotic noise field
            // Baseline (no audio): 0.125x, Maximum (full audio): 1.25x
            const dynamicNoiseScale = NOISE_SCALE * (0.125 + sphereMagnitude * 1.125);
            
            // Dynamic sphere boundary - pulsates with low frequencies
            // Baseline (no audio): 1.0, Maximum (full audio): 2.0
            const dynamicSphereBoundary = SPHERE_BOUNDARY * (1.0 + sphereMagnitude * 0.70);
            
            // Only animate particles when audio is loaded and playing
            if (audioLoaded && isPlaying) {
                for (let i = 0; i < activeCount; i++) {
                    const p = particles[i];
                    p.update(time, amp, dynamicNoiseScale, dynamicSphereBoundary);
                    
                    // Color based on distance from sphere center
                    const distFromCenter = Math.sqrt(
                        p.position.x * p.position.x +
                        p.position.y * p.position.y +
                        p.position.z * p.position.z
                    );
                    const normalizedDist = Math.min(distFromCenter / dynamicSphereBoundary, 1.0);
                    
                    // Sample both colormaps at this distance
                    const cA = sampleColormap(COLORMAPS[cmapA].stops, normalizedDist);
                    const cB = sampleColormap(COLORMAPS[cmapB].stops, normalizedDist);
                    
                    // Mix between the two colormaps
                    const c = [
                        cA[0] + (cB[0] - cA[0]) * cmapMix,
                        cA[1] + (cB[1] - cA[1]) * cmapMix,
                        cA[2] + (cB[2] - cA[2]) * cmapMix,
                    ];
                    
                    p.color.setRGB(c[0] * brightness, c[1] * brightness, c[2] * brightness);
                }
            }
            // When paused, don't update particles at all - keep visualization frozen
            // (handled by the early-return freeze above)

            // Particle size: swells with bass (low-freq) hits
            particleMaterial.size = PARTICLE_SIZE * (1.0 + sphereMagnitude * reactivityMultiplier * 2.2);

            // ===== BEAT DETECTION =====
            if (isPlaying) {
                const bassEnergy = activeMagnitudes[0] * 0.5 + activeMagnitudes[1] * 0.5; // Sub Bass + Bass
                beatHistory[beatHistoryIdx] = bassEnergy;
                beatHistoryIdx = (beatHistoryIdx + 1) % BEAT_HISTORY;
                const avgBeat = beatHistory.reduce((a, b) => a + b, 0) / BEAT_HISTORY;
                const beatThreshold = avgBeat * (1.55 - reactivityMultiplier * 0.1);
                beatCooldown = Math.max(0, beatCooldown - 1);
                if (bassEnergy > beatThreshold && bassEnergy > 0.25 && beatCooldown === 0) {
                    // Trigger beat flash
                    const flash = document.getElementById('beat-flash');
                    flash.classList.remove('flash');
                    void flash.offsetWidth; // force reflow
                    flash.classList.add('flash');
                    beatCooldown = 14; // ~230ms cooldown at 60fps
                }
            }

            updateParticleGeometry();
            // Camera fixed (no motion)
            camera.lookAt(0, 0, 0);

            // Update bloom strength: lerp toward target for smooth transitions
            const bloomTarget = audioLoaded ? (0.60 + avgMagnitude * reactivityMultiplier * 3.20) : 0.55;
            smoothedBloom += (bloomTarget - smoothedBloom) * 0.08;
            bloomPass.strength = smoothedBloom;

            // Render bloom from tunnel-only layer, then composite over full scene
            camera.layers.set(BLOOM_LAYER);
            bloomComposer.render();
            camera.layers.set(0);
            finalComposer.render();
}

        // ===== AUDIO ANALYSIS =====
        function analyzeAudio() {
            requestAnimationFrame(analyzeAudio);

            if (analyser && audioLoaded && isPlaying) {
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(dataArray);

                const sampleRate = audioContext.sampleRate;
                const binCount = analyser.frequencyBinCount;

                // Calculate all frequency bands for tunnel
                FREQ_BANDS.forEach((band, index) => {
                    const minBin = Math.floor((band.min / (sampleRate / 2)) * binCount);
                    const maxBin = Math.floor((band.max / (sampleRate / 2)) * binCount);

                    let sum = 0;
                    for (let i = minBin; i < maxBin; i++) {
                        sum += dataArray[i];
                    }
                    currentMagnitudes[index] = sum / (maxBin - minBin) / 255;
                });

                // Calculate low frequency magnitude (0-150Hz) for sphere particles
                const lowFreqMinBin = Math.floor((0 / (sampleRate / 2)) * binCount);
                const lowFreqMaxBin = Math.floor((150 / (sampleRate / 2)) * binCount);
                let lowFreqSum = 0;
                for (let i = lowFreqMinBin; i < lowFreqMaxBin; i++) {
                    lowFreqSum += dataArray[i];
                }
                currentLowFreqMagnitude = lowFreqSum / (lowFreqMaxBin - lowFreqMinBin) / 255;
            } else {
                // Reset when not playing
                currentMagnitudes.fill(0);
                currentLowFreqMagnitude = 0;
            }
        }

        // ===== UI CONTROLS =====
        const loadBtn      = document.getElementById('load-btn');
        const playBtn      = document.getElementById('play-btn');
        const audioNameEl  = document.getElementById('audio-name');
        const volumeSlider = document.getElementById('volume-slider');
        const volumeValue  = document.getElementById('volume-value');

        // Volume control (declared early so loadAudioFile can reference it)
        volumeSlider.addEventListener('input', (e) => {
            const vol = e.target.value / 100;
            if (gainNode) gainNode.gain.value = vol;
            volumeValue.textContent = e.target.value + '%';
        });

        // Core file-loading logic
        const loadAudioFile = async (file) => {
            console.log('Loading file:', file.name, file.type);
            loadBtn.textContent = 'Loading...';
            loadBtn.disabled = true;

            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (!analyser) {
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 4096;
                    analyser.smoothingTimeConstant = 0.8;
                }
                if (!gainNode) {
                    gainNode = audioContext.createGain();
                    gainNode.gain.value = volumeSlider.value / 100;
                }

                // Stop and cleanup previous audio
                if (audioElement) {
                    audioElement.pause();
                    audioElement.currentTime = 0;
                }
                if (audioSource) {
                    try { audioSource.disconnect(); } catch (_) {}
                    audioSource = null;
                }

                audioElement = new Audio();
                audioElement.crossOrigin = 'anonymous';
                const url = URL.createObjectURL(file);

                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Audio load timeout')), 10000);
                    audioElement.addEventListener('loadedmetadata', () => { clearTimeout(timeout); resolve(); }, { once: true });
                    audioElement.addEventListener('error', (ev) => { clearTimeout(timeout); reject(new Error('Failed to load audio')); }, { once: true });
                    audioElement.src = url;
                    audioElement.load();
                });

                audioSource = audioContext.createMediaElementSource(audioElement);
                audioSource.connect(analyser);
                audioSource.connect(gainNode);
                gainNode.connect(audioContext.destination);

                audioLoaded = true;
                isPlaying   = false;
                playBtn.disabled  = false;
                playBtn.textContent = '▶ Play';
                playBtn.className   = 'play';
                audioNameEl.textContent = file.name;
                document.getElementById('progress-container').style.display = 'block';

                audioElement.addEventListener('ended', () => {
                    isPlaying = false;
                    playBtn.textContent = '▶ Play';
                    playBtn.className   = 'play';
                });

                loadBtn.textContent = 'Load Audio File';
                loadBtn.disabled = false;

            } catch (error) {
                console.error('Failed to load audio:', error);
                audioNameEl.textContent = 'Load failed – try again';
                loadBtn.textContent = 'Load Audio File';
                loadBtn.disabled = false;
            }
        };

        // Load button → create a fresh file input and click it immediately
        loadBtn.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'audio/*';
            input.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0;';
            document.body.appendChild(input);
            input.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                document.body.removeChild(input);
                if (file) await loadAudioFile(file);
            });
            input.addEventListener('cancel', () => {
                document.body.removeChild(input);
            });
            input.click();
        });

        playBtn.addEventListener('click', async () => {
            if (!audioLoaded) return;

            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
                // Store current magnitudes to freeze visualization
                frozenMagnitudes = [...currentMagnitudes];
                frozenLowFreqMagnitude = currentLowFreqMagnitude;
                playBtn.textContent = '▶ Play';
                playBtn.className = 'play';
            } else {
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                await audioElement.play();
                isPlaying = true;
                playBtn.textContent = '⏸ Pause';
                playBtn.className = 'pause';
            }
        });

        // Progress bar scrub – supports both click and drag
        const progressBar = document.getElementById('progress-bar');
        let isScrubbing = false;

        function scrubTo(clientX) {
            if (!audioLoaded || !audioElement) return;
            const rect = progressBar.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            audioElement.currentTime = pct * audioElement.duration;
        }

        progressBar.addEventListener('mousedown', (e) => {
            isScrubbing = true;
            scrubTo(e.clientX);
            e.preventDefault();
        });
        progressBar.addEventListener('touchstart', (e) => {
            isScrubbing = true;
            scrubTo(e.touches[0].clientX);
        }, { passive: true });
        document.addEventListener('mousemove', (e) => { if (isScrubbing) scrubTo(e.clientX); });
        document.addEventListener('touchmove', (e) => { if (isScrubbing) scrubTo(e.touches[0].clientX); }, { passive: true });
        document.addEventListener('mouseup', () => { isScrubbing = false; });
        document.addEventListener('touchend', () => { isScrubbing = false; });

        // Reactivity slider
        const reactivitySlider = document.getElementById('reactivity-slider');
        const reactivityValue = document.getElementById('reactivity-value');
        reactivitySlider.addEventListener('input', (e) => {
            reactivityMultiplier = e.target.value / 100;
            reactivityValue.textContent = e.target.value + '%';
        });

        // Colormap selector – build buttons dynamically
        const cmapGrid = document.getElementById('cmap-grid');
        COLORMAPS.forEach((cm, idx) => {
            const btn = document.createElement('button');
            btn.className = 'cmap-btn';
            btn.textContent = cm.name;
            btn.dataset.cmap = idx;
            btn.addEventListener('click', () => {
                lockedCmapIndex = idx;
                // Update button states
                cmapGrid.querySelectorAll('.cmap-btn').forEach(b => {
                    b.classList.remove('active', 'auto-active');
                    if (parseInt(b.dataset.cmap) === idx) b.classList.add('active');
                    if (b.dataset.cmap === 'auto') b.classList.remove('auto-active');
                });
            });
            cmapGrid.appendChild(btn);
        });

        // Auto-cycle button
        const autoBtn = cmapGrid.querySelector('[data-cmap="auto"]');
        autoBtn.addEventListener('click', () => {
            lockedCmapIndex = -1;
            cmapGrid.querySelectorAll('.cmap-btn').forEach(b => b.classList.remove('active'));
            autoBtn.classList.add('auto-active');
        });

        // Colormap section toggle (collapsed by default)
        const cmapToggleRow = document.getElementById('cmap-toggle-row');
        const cmapBody      = document.getElementById('cmap-body');
        const cmapArrow     = document.getElementById('cmap-arrow');
        cmapBody.classList.add('collapsed'); // start collapsed
        cmapToggleRow.addEventListener('click', () => {
            const isCollapsed = cmapBody.classList.toggle('collapsed');
            cmapArrow.classList.toggle('open', !isCollapsed);
        });

        // Reset to defaults button
        const resetBtn = document.getElementById('reset-btn');
        function applyDefaults() {
            // Volume
            volumeSlider.value = 100;
            volumeValue.textContent = '100%';
            if (gainNode) gainNode.gain.value = 1;

            // Reactivity
            const reactivitySlider = document.getElementById('reactivity-slider');
            const reactivityValue  = document.getElementById('reactivity-value');
            reactivitySlider.value = 100;
            reactivityValue.textContent = '100%';
            reactivityMultiplier = 1.0;

            // Colormap → auto-cycle
            lockedCmapIndex = -1;
            cmapGrid.querySelectorAll('.cmap-btn').forEach(b => b.classList.remove('active'));
            autoBtn.classList.add('auto-active');
        }
        resetBtn.addEventListener('click', applyDefaults);

        // Minimize / collapse panel
        const minimizeBtn = document.getElementById('minimize-btn');
        minimizeBtn.addEventListener('click', () => {
            controlsPanel.classList.toggle('collapsed');
            minimizeBtn.textContent = controlsPanel.classList.contains('collapsed') ? '+' : '−';
        });

        // ===== DRAG AND DROP =====
        const dragOverlay = document.getElementById('drag-overlay');
        let dragCounter = 0;

        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            if (e.dataTransfer.types.includes('Files')) dragOverlay.classList.add('active');
        });
        document.addEventListener('dragleave', () => {
            dragCounter--;
            if (dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('active'); }
        });
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            dragCounter = 0;
            dragOverlay.classList.remove('active');
            const file = e.dataTransfer.files[0];
            if (!file || !file.type.startsWith('audio/')) return;
            // Reuse the same load logic via a synthetic FileList on the input
            await loadAudioFile(file);
        });

        // Fullscreen functionality with 'F' key
        const visualizerContainer = document.querySelector('.visualizer-container');
        const controlsPanel = document.getElementById('controls');
        
        document.addEventListener('keydown', (e) => {
            // Fullscreen toggle with F key
            if (e.key === 'f' || e.key === 'F') {
                e.preventDefault();
                if (!document.fullscreenElement) {
                    visualizerContainer.requestFullscreen().catch(err => {
                        console.error('Error attempting to enable fullscreen:', err);
                    });
                } else {
                    document.exitFullscreen();
                }
            }
            
            // Play/Pause with spacebar
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                if (audioLoaded) {
                    playBtn.click();
                }
            }
            
            // Hide/Show GUI with H key
            if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                controlsPanel.classList.toggle('hidden');
            }
        });

        // ===== START =====
        animate();
        analyzeAudio();

        // Handle resize
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
            bloomComposer.setSize(width, height);
            finalComposer.setSize(width, height);
            
            // Update bloom resolution
            bloomPass.resolution = new THREE.Vector2(width, height);
        });
    </script>
    </div> <!-- End visualizer-container -->
</body>
</html>
